name: Scrape OSRS Wiki Data

on:
  schedule:
    - cron: "0 10 * * *" # Daily at 10:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ── Job 1: Scrape data (runs automatically) ──────────────────────────
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      status: ${{ steps.scrape.outputs.status }}
      changed: ${{ steps.changes.outputs.changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build cache dumper
        run: ./gradlew cache-dumper:shadowJar

      - name: Extract requirements from game cache
        run: |
          set +e
          java -jar cache-dumper/build/libs/cache-dumper-all.jar data/requirements.json
          exit_code=$?
          set -e
          if [ $exit_code -ne 0 ]; then
            echo "WARNING: cache dump failed (exit $exit_code), continuing without requirements"
          fi

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        id: scrape
        run: |
          set +e
          python scraper/scrape.py
          exit_code=$?
          set -e

          if [ $exit_code -eq 0 ]; then
            echo "status=ok" >> "$GITHUB_OUTPUT"
          elif [ $exit_code -eq 2 ]; then
            echo "status=drift" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Check for data changes
        id: changes
        run: |
          if git diff --quiet data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload scraped data
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: scraped-data
          path: data/
          retention-days: 7

      - name: Open failure issue
        if: failure() && steps.scrape.outputs.status == 'failed'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Scraper failed — $(date -u +%Y-%m-%d)" \
            --body "The daily OSRS data scrape failed.

          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Please investigate the logs and re-run manually if needed."

  # ── Job 2: Deploy data (requires manual approval) ────────────────────
  #
  # Configure the "production" environment in GitHub repo settings:
  #   Settings → Environments → New environment → "production"
  #   → Add required reviewers (yourself)
  #
  # After a successful scrape, this job will wait for approval.
  # You'll get a notification — click "Review deployments" → Approve.
  # If the scrape had issues, just don't approve and it expires.
  #
  deploy:
    needs: scrape
    if: needs.scrape.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download scraped data
        uses: actions/download-artifact@v4
        with:
          name: scraped-data
          path: data/

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Show diff summary
        run: |
          echo "=== Data changes ==="
          git diff --stat data/
          echo ""
          echo "=== Entry counts ==="
          python3 -c "
          import json
          meta = json.load(open('data/metadata.json'))
          for f, info in sorted(meta['files'].items()):
              print(f'  {f}: {info[\"entries\"]} entries')
          "

      - name: Commit to main
        if: needs.scrape.outputs.status == 'ok'
        run: |
          git add data/
          git commit -m "chore: update OSRS data $(date -u +%Y-%m-%d)"
          git push

      - name: Create drift PR
        if: needs.scrape.outputs.status == 'drift'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="data-drift/$(date -u +%Y-%m-%d-%H%M%S)"
          git checkout -b "$branch"
          git add data/
          git commit -m "chore: update OSRS data (drift detected) $(date -u +%Y-%m-%d)"
          git push -u origin "$branch"

          gh pr create \
            --title "Data drift detected — $(date -u +%Y-%m-%d)" \
            --body "## Drift Warning

          The daily scrape completed but one or more data files changed by more than 10% in entry count.
          Please review the diff before merging.

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --base main \
            --head "$branch"
